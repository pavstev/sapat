name: Sapat
options:
  bundleIdPrefix: com.stevanpavlovic
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/argmax-oss-swift
    from: "1.0.0"
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"
  # MLX engine (added during the one-time activation — see AGENTS.md):
  #   MLXSwiftLM:
  #     url: https://github.com/ml-explore/mlx-swift-lm
  #     from: "<pin>"
  # then add products MLXLLM + MLXLMCommon to the dependencies below.

targets:
  Sapat:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources
      - path: Resources
    dependencies:
      - package: WhisperKit
        product: WhisperKit
      - package: GRDB
        product: GRDB
    settings:
      base:
        PRODUCT_NAME: Sapat
        PRODUCT_BUNDLE_IDENTIFIER: com.stevanpavlovic.Sapat
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Info.plist
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        # Local-only, ad-hoc "Sign to Run Locally", non-sandboxed.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: YES
        ENABLE_HARDENED_RUNTIME: NO
        ENABLE_APP_SANDBOX: NO
        DEAD_CODE_STRIPPING: YES
        COMBINE_HIDPI_IMAGES: YES
