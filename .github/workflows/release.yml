name: Release

# Fully automated: push a tag like v1.2.3 and this builds, packages, and publishes
# a GitHub Release with the zipped app and auto-generated notes.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Build & publish
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-build

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and bundle
        env:
          SAPAT_VERSION: ${{ steps.version.outputs.version }}
        run: ./bundle.sh

      - name: Package zip
        run: |
          ditto -c -k --sequesterRsrc --keepParent Sapat.app "Sapat-${{ steps.version.outputs.version }}.zip"

      # Fail-closed trust chain (F3): sign the zip with the ed25519 key held only in the
      # SAPAT_SIGNING_KEY secret. Produces Sapat-X.zip.sig (verified in-app) + .sha256.
      - name: Sign artifact
        env:
          SAPAT_SIGNING_KEY: ${{ secrets.SAPAT_SIGNING_KEY }}
        run: swift scripts/sign-release.swift "Sapat-${{ steps.version.outputs.version }}.zip"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "Sapat-${{ steps.version.outputs.version }}.zip" \
            "Sapat-${{ steps.version.outputs.version }}.zip.sig" \
            "Sapat-${{ steps.version.outputs.version }}.zip.sha256" \
            --title "Šapat ${GITHUB_REF_NAME}" \
            --generate-notes
