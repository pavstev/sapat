name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # WhisperKit 1.0.0 requires Xcode 16+ / macOS 15 SDK (uses MLState, @retroactive).
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Toolchain
        run: swift --version && xcodebuild -version

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Test
        run: swift test

      - name: Build and bundle
        run: ./bundle.sh

      - name: Verify bundle
        run: |
          codesign --verify --verbose=2 Glasnik.app
          /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" Glasnik.app/Contents/Info.plist
