name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain
        run: swift --version

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Build and bundle
        run: ./bundle.sh

      - name: Verify bundle
        run: |
          codesign --verify --verbose=2 Glasnik.app
          /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" Glasnik.app/Contents/Info.plist
